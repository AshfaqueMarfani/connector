# ═══════════════════════════════════════════════════════════════════
# Nginx server block for Connector (social.otaskflow.com)
# Copy to: /etc/nginx/sites-available/social.otaskflow.com
# Enable:  ln -s /etc/nginx/sites-available/social.otaskflow.com /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════════

# ── Upstream: Daphne ASGI on Docker port 8001 ────────────────────
upstream connector_backend {
    server 127.0.0.1:8001;
}

# ── social.otaskflow.com ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name social.otaskflow.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /opt/Connector/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/Connector/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://connector_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Django Channels)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
