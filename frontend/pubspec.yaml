name: connector_app
description: Hyperlocal Connection & Service App - Connect nearby individuals, businesses, and NGOs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.2

  # Maps & Location
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7
  intl: ^0.19.0
  timeago: ^3.6.1
  pull_to_refresh: ^2.0.0

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
  # To enable Poppins, download the font files into assets/fonts/ and uncomment above.
