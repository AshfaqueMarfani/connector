name: Connector CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.27.4"

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # BACKEND – Django Test Suite
  # ═══════════════════════════════════════════════════════════════════
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: test_connector_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_connector_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies (GDAL/PostGIS)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev libpq-dev

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          # Install GDAL Python bindings matching system libgdal version
          GDAL_VERSION=$(gdal-config --version)
          pip install GDAL==${GDAL_VERSION}

      - name: Run linting (flake8)
        run: flake8 apps/ connector_backend/ --max-line-length=120 --exclude=migrations

      - name: Run formatting check (black)
        run: black --check apps/ connector_backend/ --line-length=120 --exclude=migrations

      - name: Run import sort check (isort)
        run: isort --check-only apps/ connector_backend/ --skip migrations --profile black --line-length 120

      - name: Run Django test suite
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DB_NAME: test_connector_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          CELERY_TASK_ALWAYS_EAGER: "True"
          CELERY_TASK_EAGER_PROPAGATES: "True"
          OPENAI_API_KEY: ""
          OPENAI_MODEL: gpt-4
        run: python manage.py test --verbosity=2

  # ═══════════════════════════════════════════════════════════════════
  # FRONTEND – Flutter Analysis & Tests
  # ═══════════════════════════════════════════════════════════════════
  flutter-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze (zero errors required)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: frontend/coverage/lcov.info
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════
  # BUILD – Docker image build validation
  # ═══════════════════════════════════════════════════════════════════
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, flutter-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t connector-backend:${{ github.sha }} -f backend/Dockerfile.prod backend/

      - name: Build nginx Docker image
        run: |
          docker build -t connector-nginx:${{ github.sha }} -f backend/nginx/Dockerfile backend/nginx/

      - name: Verify images
        run: |
          docker images | grep connector
