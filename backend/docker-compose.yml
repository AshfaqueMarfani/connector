version: "3.9"

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: connector_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: connector_db
      POSTGRES_USER: connector_user
      POSTGRES_PASSWORD: connector_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connector_user -d connector_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Channels + Celery) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: connector_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend (Daphne ASGI) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connector_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput 2>/dev/null || true &&
        daphne -b 0.0.0.0 -p 8000 connector_backend.asgi:application
      "

  # ── Celery Worker ─────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connector_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A connector_backend worker -l info --concurrency=4

  # ── Celery Beat (Periodic Tasks) ──────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connector_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A connector_backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
  static_data:
  media_data:
